<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nautikal Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.23/lodash.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3059BF',
                        info: '#3059BF',
                        warn: '#ff6d03',
                        danger: '#ef4444',
                        success: '#22c55e',
                    }
                }
            }
        }
    </script>

    <style>
        [x-cloak] {
            display: none !important;
        }
    </style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 min-h-screen" x-data="app()" x-init="init()">

<!-- Mobile Header (visible on small screens) -->
<header class="lg:hidden fixed top-0 left-0 right-0 bg-white dark:bg-gray-800 shadow-lg p-4 z-50">
    <div class="flex items-center justify-between">
        <h1 class="text-xl font-bold text-primary">🎮 Nautikal Panel</h1>
        <button @click="sidebarOpen = !sidebarOpen"
                class="p-2 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
            <svg x-show="!sidebarOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
            <svg x-show="sidebarOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
    <!-- Mobile Nav Links -->
    <nav x-show="sidebarOpen" class="mt-4 space-y-2">
        <a @click="page = 'home'; sidebarOpen = false"
           :class="page === 'home' ? 'bg-primary text-white' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'"
           class="block px-4 py-2 rounded-lg cursor-pointer transition">
            🏠 Home
        </a>
        <a @click="page = 'settings'; sidebarOpen = false"
           :class="page === 'settings' ? 'bg-primary text-white' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'"
           class="block px-4 py-2 rounded-lg cursor-pointer transition">
            ⚙️ Settings
        </a>
        <p class="text-xs text-gray-400 pt-2">v1.0.0</p>
    </nav>
</header>

<!-- Sidebar -->
<aside class="hidden fixed left-0 top-0 h-full w-64 bg-white dark:bg-gray-800 shadow-lg p-4 lg:flex flex-col">
    <h1 class="text-xl font-bold text-primary mb-8">🎮 Nautikal Panel</h1>
    <nav class="flex-1 space-y-2">
        <a @click="page = 'home'"
           :class="page === 'home' ? 'bg-primary text-white' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'"
           class="block px-4 py-2 rounded-lg cursor-pointer transition">
            🏠 Home
        </a>
        <a @click="page = 'settings'"
           :class="page === 'settings' ? 'bg-primary text-white' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'"
           class="block px-4 py-2 rounded-lg cursor-pointer transition">
            ⚙️ Settings
        </a>
    </nav>
    <p class="text-xs text-gray-400">v1.0.0</p>
</aside>

<!-- Main Content -->
<main class="lg:ml-64 lg:mt-0 mt-12 p-8">

    <!-- Home Page -->
    <div x-show="page === 'home'" x-cloak>
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800 dark:text-white">Game Servers</h2>
            <button @click="showModal = true; editingServer = null;"
                    class="bg-primary text-white px-4 py-2 rounded-lg hover:opacity-90 transition">
                + Add Server
            </button>
        </div>

        <!-- Server Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <template x-for="server in servers" :key="server.id">
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-4">
                    <div class="flex gap-2 mb-2">
                        <img :src="server.icon_url" width="64px" height="64px"></img>
                        <div class="flex justify-between items-start mb-2 flex-1">
                            <div>
                                <h3 class="font-semibold text-gray-800 dark:text-white" x-text="server.name"></h3>
                                <p class="text-sm text-gray-500" x-text="server.game"></p>
                            </div>
                            <span
                                    :class="server.status === 'Running' ? 'bg-success' : (server.status === 'Offline' ? 'bg-gray-400' : 'bg-warn')"
                                    class="w-3 h-3 rounded-full"></span>
                        </div>
                    </div>
                    <div>
                        <p class="text-sm text-gray-600 dark:text-gray-400 font-mono mb-2"
                           x-text="serverAddressLine(server)"></p>
                        <p class="text-sm text-gray-500 mb-4">
                            👥 <span x-text="server.players"></span> players
                        </p>
                        <div class="flex gap-2">
                            <button type="button" @click="toggleStatus(server)"
                                    class="inline-flex rounded items-center gap-2 whitespace-nowrap px-4 py-2 text-sm font-medium tracking-wide text-white transition hover:opacity-75 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary active:opacity-100 active:outline-offset-0 disabled:opacity-75 disabled:cursor-not-allowed dark:bg-primary-dark dark:border-primary-dark dark:text-on-primary-dark dark:focus-visible:outline-primary-dark"
                                    :disabled="!['Offline','Running'].includes(server.status)"
                                    :class="server.status === 'Offline' ? 'bg-success' : (server.status === 'Running' ? 'bg-danger' : 'bg-warn')">
                                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                     class="size-5 animate-spin motion-reduce:animate-none fill-on-primary dark:fill-on-primary-dark"
                                     x-show="!['Offline', 'Running'].includes(server.status)">
                                    <path opacity="0.25"
                                          d="M12,1A11,11,0,1,0,23,12,11,11,0,0,0,12,1Zm0,19a8,8,0,1,1,8-8A8,8,0,0,1,12,20Z"/>
                                    <path
                                            d="M10.14,1.16a11,11,0,0,0-9,8.92A1.59,1.59,0,0,0,2.46,12,1.52,1.52,0,0,0,4.11,10.7a8,8,0,0,1,6.66-6.61A1.42,1.42,0,0,0,12,2.69h0A1.57,1.57,0,0,0,10.14,1.16Z"/>
                                </svg>
                                <span
                                        x-text="server.status === 'Offline' ? 'Start' : (server.status === 'Running' ? 'Stop' : 'Wait')"></span>
                            </button>
                            <button @click="openLogs(server)"
                                    :disabled="server.status !== 'Running'"
                                    class="bg-gray-200 dark:bg-gray-700 dark:text-gray-300 text-sm px-3 py-1 rounded hover:opacity-80 disabled:opacity-50 disabled:cursor-not-allowed">
                                Logs
                            </button>
<!--                            TODO implement editing. Hide the button for now.-->
<!--                            <button @click="editServer(server)"-->
<!--                                    class="bg-gray-200 dark:bg-gray-700 dark:text-gray-300 text-sm px-3 py-1 rounded hover:opacity-80">-->
<!--                                Edit-->
<!--                            </button>-->
                            <button @click="deleteServer(server.id)"
                                    class="bg-red-100 dark:bg-red-900 text-gray-300 text-sm px-3 py-1 rounded hover:opacity-80">
                                Delete
                            </button>
                        </div>
                    </div>
            </template>
        </div>

        <!-- Empty State -->
        <div x-show="servers.length === 0" class="text-center py-12 text-gray-500">
            <p class="text-4xl mb-2">🖥️</p>
            <p>No servers yet. Click "Add Server" to get started!</p>
        </div>
    </div>

    <!-- Settings Page -->
    <div x-show="page === 'settings'" x-cloak>
        <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-6">Settings</h2>
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-6 max-w-md space-y-4">
            <label class="flex items-center justify-between">
                <span class="text-gray-700 dark:text-gray-300">Dark Mode</span>
                <input type="checkbox" x-model="settings.darkMode" @change="toggleDarkMode()" class="w-5 h-5">
            </label>
            <label class="block">
                <span class="text-gray-700 dark:text-gray-300">Refresh Interval (seconds)</span>
                <input type="number" x-model="settings.refreshInterval" min="5" max="300"
                       @change="updateRefreshInterval()"
                       class="w-full mt-1 px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-300 rounded-lg">
            </label>
        </div>
    </div>
</main>

<!-- Log Viewer Modal -->
<div x-show="showLogViewer" x-cloak
     class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
     @click.self="closeLogs()">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full md:max-w-[80%] max-h-[80vh] flex flex-col m-4">
        <div class="flex items-center justify-between p-4 border-b dark:border-gray-700">
            <h3 class="text-lg font-semibold text-gray-800 dark:text-white">
                Logs: <span x-text="logViewerServer?.name || ''"></span>
            </h3>
            <div class="flex items-center gap-2">
                <button @click="clearLogs()"
                        class="text-sm px-3 py-1 bg-gray-200 dark:bg-gray-700 dark:text-gray-300 rounded hover:opacity-80">
                    Clear
                </button>
                <button @click="closeLogs()"
                        class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="flex-1 overflow-auto p-4 bg-gray-900" x-ref="logContainer">
                <pre class="text-sm font-mono text-gray-100"><template x-for="(line, index) in logLines" :key="index"><div x-text="line"></div></template></pre>
        </div>
        <div class="flex items-center justify-between p-3 border-t dark:border-gray-700 text-xs text-gray-500">
            <span x-show="logConnected" class="text-success">Connected</span>
            <span x-show="!logConnected && showLogViewer" class="text-warn">Disconnected</span>
            <span x-text="logLines.length + ' lines'"></span>
        </div>
    </div>
</div>

<!-- Notifications -->
<div x-data="notificationComponent()" @notify.window="addNotification({
            variant: $event.detail.variant,
            sender: $event.detail.sender,
            title: $event.detail.title,
            message: $event.detail.message,
        })" x-html="content">
</div>

<!-- Add/Edit Modal -->
<div x-data="createServerModal()" x-html="content"></div>

<script src="scripts/index.js"></script>
<script src="scripts/create-server-modal.js"></script>
<script src="scripts/notification-component.js"></script>
</body>

</html>
