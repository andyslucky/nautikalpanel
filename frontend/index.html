<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nautikal Panel</title>
    <style>
        [x-cloak] {
            display: none !important;
        }
    </style>
    <link rel="stylesheet" href="./src/style.css">
    <script type="module" src="src/main.ts"></script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 min-h-screen" x-data="app()" x-cloak>

<!-- Mobile Header -->
<header class="mobile-header">
    <div class="flex items-center justify-between">
        <h1 class="heading-primary dark:text-gray-100">🎮 Nautikal Panel</h1>
        <button @click="sidebarOpen = !sidebarOpen" class="icon-btn">
            <svg x-show="!sidebarOpen" class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
            <svg x-show="sidebarOpen" class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
    <nav x-show="sidebarOpen" class="mt-4 space-y-2">
        <a @click="window.location.hash = '#home'; sidebarOpen = false"
           :class="page === 'home' ? 'nav-link-active' : 'nav-link-inactive'">
            🏠 Home
        </a>
        <a @click="window.location.hash='#settings'; sidebarOpen = false"
           :class="page === 'settings' ? 'nav-link-active' : 'nav-link-inactive'">
            ⚙️ Settings
        </a>
        <p class="version-text pt-2">v1.0.0</p>
    </nav>
</header>

<!-- Sidebar -->
<aside class="sidebar">
    <h1 class="heading-primary mb-8 dark:text-gray-100">🎮 Nautikal Panel</h1>
    <nav class="flex-1 space-y-2">
        <a @click="window.location.hash = '#home'"
           :class="page === 'home' ? 'nav-link-active' : 'nav-link-inactive'">
            🏠 Home
        </a>
        <a @click="window.location.hash = '#settings'"
           :class="page === 'settings' ? 'nav-link-active' : 'nav-link-inactive'">
            ⚙️ Settings
        </a>
    </nav>
    <p class="version-text">v1.0.0</p>
</aside>

<!-- Main Content -->
<main class="main-content">

    <!-- Home Page -->
    <div x-show="page === 'home'" x-cloak>
        <div class="flex justify-between items-center mb-6">
            <h2 class="heading-secondary">Game Servers</h2>
            <button @click="showModal = true;" class="btn-primary">
                + Add Server
            </button>
        </div>

        <!-- Server Grid -->
        <div class="server-grid">
            <template x-for="server in $store.gameServers.servers" :key="server.id">
                <div class="server-card">
                    <div class="flex gap-2 mb-2">
                        <img :src="server.icon_url" width="64px" height="64px"/>
                        <div class="flex justify-between items-start mb-2 flex-1">
                            <div>
                                <h3 class="font-semibold text-gray-800 dark:text-white" x-text="server.name"></h3>
                                <p class="text-sm text-muted" x-text="server.game"></p>
                            </div>
                            <i x-show="server.instance_type === 'sftp-only'" class="text-sm text-muted">(SFTP Only)</i>
                            <span :class="server.status === 'Running' ? 'bg-success' : (server.status === 'Offline' ? 'bg-gray-400' : 'bg-warn')"
                                  class="status-dot"></span>
                        </div>
                    </div>
                    <div>
                        <p class="server-address" x-text="$store.gameServers.serverAddressLine(server)"></p>
                        <p class="server-info">
                            👥 <span x-text="server.players"></span> players
                        </p>
                        <div class="resource-info mb-3 text-xs text-muted" x-show="server.status === 'Running'">
                            <div class="space-y-2">
                                <div class="resource-item">
                                    <div class="flex justify-between mb-1">
                                        <div class="resource-label">CPU</div>
                                        <div class="resource-value">
                                            <span x-text="formatCpuString(server.cpu_usage_millicores) + ' / ' + server.cpu_limit "></span>
                                        </div>
                                    </div>
                                    <div class="h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                                        <div
                                                class="h-full rounded-full transition-all duration-500"
                                                :class="$store.gameServers.getCpuUsageColor($store.gameServers.calculateCpuUsagePercentage(server))"
                                                :style="{ width: $store.gameServers.calculateCpuUsagePercentage(server) + '%' }"
                                                x-show="server.status === 'Running'">
                                        </div>
                                    </div>
                                </div>
                                <div class="resource-item">
                                    <div class="flex justify-between mb-1">
                                        <div class="resource-label">Memory</div>
                                        <div class="resource-value">
                                            <span x-text="formatMemoryString(server.memory_usage_bytes / 1048576.0) + ' / ' + formatMemoryString(parseMemory(server.memory_limit))"></span>
                                        </div>
                                    </div>
                                    <div class="h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                                        <div
                                                class="h-full rounded-full transition-all duration-500"
                                                :class="$store.gameServers.getMemoryUsageColor($store.gameServers.calculateMemoryUsagePercentage(server))"
                                                :style="{ width: $store.gameServers.calculateMemoryUsagePercentage(server) + '%' }"
                                                x-show="server.status === 'Running'">
                                        </div>
                                    </div>
                                </div>
                                <div class="resource-item">
                                    <div class="flex justify-between mb-1">
                                        <div class="resource-label">Storage</div>
                                        <div class="resource-value" x-text="$store.gameServers.formatStorage(server.storage_size, server.storage_unit)"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button type="button" @click="$store.gameServers.toggleStatus(server)"
                                    class="btn-action"
                                    :disabled="!['Offline','Running'].includes(server.status)"
                                    :class="server.status === 'Offline' ? 'bg-success' : (server.status === 'Running' ? 'bg-danger' : 'bg-warn')">
                                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                     class="size-5 animate-spin motion-reduce:animate-none"
                                     x-show="!['Offline', 'Running'].includes(server.status)">
                                    <path opacity="0.25"
                                          d="M12,1A11,11,0,1,0,23,12,11,11,0,0,0,12,1Zm0,19a8,8,0,1,1,8-8A8,8,0,0,1,12,20Z"/>
                                    <path
                                            d="M10.14,1.16a11,11,0,0,0-9,8.92A1.59,1.59,0,0,0,2.46,12,1.52,1.52,0,0,0,4.11,10.7a8,8,0,0,1,6.66-6.61A1.42,1.42,0,0,0,12,2.69h0A1.57,1.57,0,0,0,10.14,1.16Z"/>
                                </svg>
                                <span x-text="server.status === 'Offline' ? 'Start' : (server.status === 'Running' ? 'Stop' : 'Wait')"></span>
                            </button>
                            <button type="button" @click="$store.gameServers.startSftpOnly(server)"
                                    x-show="server.status === 'Offline'"
                                    class="btn-secondary disabled:opacity-50 disabled:cursor-not-allowed">
                                SFTP Only
                            </button>
                            <button @click="$store.gameServers.fetchSftpCredentials(server)"
                                    x-show="server.status === 'Running'"
                                    class="btn-secondary disabled:opacity-50 disabled:cursor-not-allowed">
                                SFTP Credentials
                            </button>
                            <button @click="$store.gameServers.openLogs(server)"
                                    x-show="server.status === 'Running' && server.instance_type === 'gameserver'"
                                    class="btn-secondary disabled:opacity-50 disabled:cursor-not-allowed">
                                Logs
                            </button>
                            <button @click="deleteServer(server.id)" class="btn-danger">
                                Delete
                            </button>
                            <button @click="$dispatch('edit', {server: server})"
                                    :disabled="server.status !== 'Offline'"
                                    class="btn-secondary disabled:opacity-50 disabled:cursor-not-allowed">
                                Edit
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Empty State -->
        <div x-show="$store.gameServers.servers.length === 0" class="text-center py-12 text-muted">
            <p class="text-4xl mb-2">🖥️</p>
            <p>No servers yet. Click "Add Server" to get started!</p>
        </div>
    </div>

    <!-- Settings Page -->
    <div x-show="page === 'settings'" x-html="content" x-data="settings()">
    </div>
</main>

<!-- Logs Modal -->
<div x-data="logsModal()" x-html="content"></div>

<!-- SFTP Credentials Modal -->
<div x-show="$store.gameServers.showSftpCredentials" x-cloak class="modal-backdrop" @click.self="$store.gameServers.closeSftpCredentials()">
    <div class="modal-content max-w-md">
        <div class="modal-header">
            <h3 class="heading-tertiary">SFTP Credentials</h3>
            <button @click="$store.gameServers.closeSftpCredentials()" class="close-btn">
                <svg class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="p-4 space-y-4">
            <div class="warning-box">
                <p class="warning-title">Keep these credentials secure!</p>
                <p class="warning-text">These credentials are ephemeral and will be lost when the Game Server is stopped.</p>
            </div>
            <div class="space-y-2">
                <label class="form-label-sm">Host</label>
                <div class="flex items-center gap-2">
                    <code class="flex-1 px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-sm text-label"
                          x-text="$store.gameServers.sftpCredentialsServer?.ip || 'Pending...'"></code>
                    <button @click="navigator.clipboard.writeText($store.gameServers.sftpCredentialsServer?.ip || ''); showToast('Copied host!', 'success')"
                            class="btn-secondary text-xs">Copy
                    </button>
                </div>
            </div>
            <div class="space-y-2">
                <label class="form-label-sm">Port</label>
                <div class="flex items-center gap-2">
                    <code class="flex-1 px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-sm text-label">22</code>
                </div>
            </div>
            <div class="space-y-2">
                <label class="form-label-sm">Username</label>
                <div class="flex items-center gap-2">
                    <code class="flex-1 px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-sm text-label"
                          x-text="$store.gameServers.sftpCredentials?.username || ''"></code>
                    <button @click="navigator.clipboard.writeText($store.gameServers.sftpCredentials?.username || ''); showToast('Copied username!', 'success')"
                            class="btn-secondary text-xs">Copy
                    </button>
                </div>
            </div>
            <div class="space-y-2">
                <label class="form-label-sm">Password</label>
                <div class="flex items-center gap-2">
                    <code class="flex-1 px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-sm font-mono text-label"
                          x-text="$store.gameServers.sftpCredentials?.password || ''"></code>
                    <button @click="navigator.clipboard.writeText($store.gameServers.sftpCredentials?.password || ''); showToast('Copied password!', 'success')"
                            class="btn-secondary text-xs">Copy
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Notifications -->
<div x-data="notificationComponent()" @notify.window="addNotification({
            variant: $event.detail.variant,
            sender: $event.detail.sender,
            title: $event.detail.title,
            message: $event.detail.message,
        })" x-html="content">
</div>

<!-- Add/Edit Modal -->
<div x-data="createServerModal()" x-html="content"></div>

<!-- Edit Server Modal - uses main app's state -->
<div x-data="editServerModal()" x-html="content" @edit.window="openEditModal($event.detail.server)"></div>
</body>

</html>
