<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nautikal Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        warn: '#ff6d03',
                        danger: '#ef4444',
                        success: '#22c55e',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen" x-data="app()" x-init="init()">

<!-- Mobile Header (visible on small screens) -->
<header class="lg:hidden fixed top-0 left-0 right-0 bg-white dark:bg-gray-800 shadow-lg p-4 z-50">
    <div class="flex items-center justify-between">
        <h1 class="text-xl font-bold text-primary">🎮 Nautikal Panel</h1>
        <button @click="sidebarOpen = !sidebarOpen"
                class="p-2 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
            <svg x-show="!sidebarOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
            <svg x-show="sidebarOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
    <!-- Mobile Nav Links -->
    <nav x-show="sidebarOpen" class="mt-4 space-y-2">
        <a @click="page = 'home'; sidebarOpen = false"
           :class="page === 'home' ? 'bg-primary text-white' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'"
           class="block px-4 py-2 rounded-lg cursor-pointer transition">
            🏠 Home
        </a>
        <a @click="page = 'settings'; sidebarOpen = false"
           :class="page === 'settings' ? 'bg-primary text-white' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'"
           class="block px-4 py-2 rounded-lg cursor-pointer transition">
            ⚙️ Settings
        </a>
        <p class="text-xs text-gray-400 pt-2">v1.0.0</p>
    </nav>
</header>

<!-- Sidebar -->
<aside class="hidden fixed left-0 top-0 h-full w-64 bg-white dark:bg-gray-800 shadow-lg p-4 lg:flex flex-col">
    <h1 class="text-xl font-bold text-primary mb-8">🎮 Nautikal Panel</h1>
    <nav class="flex-1 space-y-2">
        <a @click="page = 'home'"
           :class="page === 'home' ? 'bg-primary text-white' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'"
           class="block px-4 py-2 rounded-lg cursor-pointer transition">
            🏠 Home
        </a>
        <a @click="page = 'settings'"
           :class="page === 'settings' ? 'bg-primary text-white' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'"
           class="block px-4 py-2 rounded-lg cursor-pointer transition">
            ⚙️ Settings
        </a>
    </nav>
    <p class="text-xs text-gray-400">v1.0.0</p>
</aside>

<!-- Main Content -->
<main class="lg:ml-64 lg:mt-0 mt-12 p-8">

    <!-- Home Page -->
    <div x-show="page === 'home'" x-cloak>
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800 dark:text-white">Game Servers</h2>
            <button @click="showModal = true; editingServer = null; resetForm()"
                    class="bg-primary text-white px-4 py-2 rounded-lg hover:opacity-90 transition">
                + Add Server
            </button>
        </div>

        <!-- Server Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <template x-for="server in servers" :key="server.id">
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-4">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h3 class="font-semibold text-gray-800 dark:text-white" x-text="server.name"></h3>
                            <p class="text-sm text-gray-500" x-text="server.game"></p>
                        </div>
                        <span :class="server.status === 'Running' ? 'bg-success' : (server.status === 'Offline' ? 'bg-gray-400' : 'bg-warn')"
                              class="w-3 h-3 rounded-full"></span>
                    </div>
                    <p class="text-sm text-gray-600 dark:text-gray-400 font-mono mb-2"
                       x-text="serverAddressLine(server)"></p>
                    <p class="text-sm text-gray-500 mb-4">
                        👥 <span x-text="server.players"></span> players
                    </p>
                    <div class="flex gap-2">
                        <button @click="toggleStatus(server)"
                                :class="server.status === 'Offline' ? 'bg-success' : (server.status === 'Running' ? 'bg-danger' : 'bg-warn')"
                                :disabled="!['Running', 'Offline'].includes(server.status)"
                                class="text-white text-sm px-3 py-1 rounded transition"
                                x-text="server.status === 'Offline' ? 'Start' : (server.status === 'Running' ? 'Stop' : 'Wait')">
                        </button>
                        <button @click="editServer(server)"
                                class="bg-gray-200 dark:bg-gray-700 dark:text-gray-300 text-sm px-3 py-1 rounded hover:opacity-80">
                            Edit
                        </button>
                        <button @click="deleteServer(server.id)"
                                class="bg-red-100 dark:bg-red-900 text-danger text-sm px-3 py-1 rounded hover:opacity-80">
                            Delete
                        </button>
                    </div>
                </div>
            </template>
        </div>

        <!-- Empty State -->
        <div x-show="servers.length === 0" class="text-center py-12 text-gray-500">
            <p class="text-4xl mb-2">🖥️</p>
            <p>No servers yet. Click "Add Server" to get started!</p>
        </div>
    </div>

    <!-- Settings Page -->
    <div x-show="page === 'settings'" x-cloak>
        <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-6">Settings</h2>
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-6 max-w-md space-y-4">
            <label class="flex items-center justify-between">
                <span class="text-gray-700 dark:text-gray-300">Dark Mode</span>
                <input type="checkbox" x-model="settings.darkMode" @change="toggleDarkMode()" class="w-5 h-5">
            </label>
            <label class="block">
                <span class="text-gray-700 dark:text-gray-300">Refresh Interval (seconds)</span>
                <input type="number" x-model="settings.refreshInterval" min="5" max="300"
                       @change="updateRefreshInterval()"
                       class="w-full mt-1 px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-300 rounded-lg">
            </label>
        </div>
    </div>
</main>

<!-- Toast Notification -->
<div x-show="toast.show" x-cloak x-transition
     :class="toast.type === 'error' ? 'bg-danger' : (toast.type === 'warn' ? 'bg-warn' : 'bg-success')"
     class="fixed bottom-4 right-4 px-4 py-3 rounded-lg shadow-lg text-white flex items-center gap-2 z-50" role="alert">
    <span x-text="toast.message"></span>
    <button @click="toast.show = false" class="ml-2 hover:opacity-80">✕</button>
</div>

<!-- Add/Edit Modal -->
<div x-show="showModal" x-cloak
     class="fixed inset-0 bg-black/50 flex items-center justify-center"
     @click.self="showModal = false">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-xl p-6 w-full max-w-md">
        <h3 class="text-lg font-bold text-gray-800 dark:text-white mb-4"
            x-text="editingServer ? 'Edit Server' : 'Add Server'"></h3>
        <form @submit.prevent="createServer()" class="space-y-4">
            <input type="text" x-model="form.name" placeholder="Server Name" required
                   class="w-full px-3 py-2 border dark:text-gray-300 dark:bg-gray-700 dark:border-gray-600 rounded-lg">
            <div class="flex gap-2">
                <select class="flex-1 px-3 py-2 border dark:text-gray-300 dark:bg-gray-700 dark:border-gray-600 rounded-lg">
                    <option>Game</option>
                    <template x-for="temp in gameServerTemplates">
                        <option @click="useTemplate(temp)" x-text="temp.template_name"></option>
                    </template>
                </select>
                <input type="number" x-model="form.max_players" placeholder="Players" min="0"
                       class="w-24 px-3 py-2 border dark:text-gray-300 dark:bg-gray-700 dark:border-gray-600 rounded-lg">
            </div>
            <div class="flex gap-2 items-center cursor-pointer "
                 :class="modalConfig.podConfigVisible ? 'dark:text-white font-bold' : 'dark:text-gray-300' "
                 @click="modalConfig.podConfigVisible = !modalConfig.podConfigVisible">
                <div class="flex-grow border-t border-gray-300"></div>
                <i class="flex-shrink">Pod Config</i>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>
            <div class="flex gap-2 flex-col" x-show="modalConfig.podConfigVisible">
                <input type="text" x-model="form.template.pod_config.image"
                       placeholder="Container Image (e.g., itzg/minecraft-server)" required
                       class="w-full px-3 py-2 border dark:text-gray-300 dark:bg-gray-700 dark:border-gray-600 rounded-lg">
                <div class="flex flex-col gap-2" style="max-height: 20vh; overflow-y: scroll;">
                    <template x-for="(value, key) in form.template.pod_config.env">
                        <!--                    TODO Fix environment variable adding / editing. Seems kinda glitchy-->
                        <div class="flex gap-6">
                            <input type="text" x-model="key" required
                                   class="min-w-0 px-3 py-2 border dark:text-gray-300 dark:bg-gray-700 dark:border-gray-600 rounded-lg">
                            <input type="text" x-model="value" required
                                   class="min-w-0 px-3 py-2 border dark:text-gray-300 dark:bg-gray-700 dark:border-gray-600 rounded-lg">
                            <button type="button"
                                    class="px-4 py-2 bg-danger text-white rounded-lg hover:opacity-90"
                                    x-show="Object.keys(form.template.pod_config.env).length > 0"
                                    @click="delete form.template.pod_config.env[key]">
                                🗑️
                            </button>
                        </div>
                    </template>
                    <button type="button"
                            class="px-4 py-2 bg-primary text-white rounded-lg hover:opacity-90"
                            @click="form.template.pod_config.env[''] = ''">
                        Add Environment Variable +
                    </button>
                </div>
            </div>
            <div class="flex gap-2 items-center cursor-pointer "
                 :class="modalConfig.storageVisible ? 'dark:text-white font-bold' : 'dark:text-gray-300' "
                 @click="modalConfig.storageVisible = !modalConfig.storageVisible">
                <div class="flex-grow border-t border-gray-300"></div>
                <i class="flex-shrink">Storage</i>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>
            <div class="flex gap-2" x-show="modalConfig.storageVisible">
                <input type="number" x-model="form.template.pvc_config.size" placeholder="Storage Size" min="1" required
                       class="flex-1 px-3 py-2 border dark:text-gray-300 dark:bg-gray-700 dark:border-gray-600 rounded-lg">
                <select x-model="form.template.pvc_config.size_unit"
                        class="w-20 px-2 py-2 border dark:text-gray-300 dark:bg-gray-700 dark:border-gray-600 rounded-lg text-sm">
                    <option value="Mi">Mi</option>
                    <option value="Gi">Gi</option>
                </select>
            </div>
            <div class="flex gap-2 items-center cursor-pointer "
                 :class="modalConfig.networkVisible ? 'dark:text-white font-bold' : 'dark:text-gray-300' "
                 @click="modalConfig.networkVisible = !modalConfig.networkVisible">
                <div class="flex-grow border-t border-gray-300"></div>
                <i class="flex-shrink">Network</i>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>
            <div class="flex gap-2 flex-col" x-show="modalConfig.networkVisible">
                <input type="text" x-model="form.ip" placeholder="IP Address (Optional)"
                       class="px-3 py-2 border dark:text-gray-300 dark:bg-gray-700 dark:border-gray-600 rounded-lg">
                <template x-for="(p, index) in form.template.service_config.ports">
                    <div class="flex gap-6">
                        <input type="number" x-model="p.port" placeholder="Port" required
                               class="min-w-0 flex-grow px-3 py-2 border dark:text-gray-300 dark:bg-gray-700 dark:border-gray-600 rounded-lg">
                        <select required
                                x-model="p.protocol"
                                class="min-w-0 flex-shrink px-3 py-2 border dark:text-gray-300 dark:bg-gray-700 dark:border-gray-600 rounded-lg">
                            <option value="TCP">TCP</option>
                            <option value="UDP">UDP</option>
                            <option value="Both">Both</option>
                        </select>
                        <button type="button"
                                class="px-4 py-2 bg-danger text-white rounded-lg hover:opacity-90"
                                x-show="form.template.service_config.ports.length > 1"
                                @click="form.template.service_config.ports.splice(index, 1)">
                            🗑️
                        </button>
                    </div>
                </template>
                <button type="button"
                        class="px-4 py-2 bg-primary text-white rounded-lg hover:opacity-90"
                        @click="form.template.service_config.ports.push({port: '', protocol: ''})">
                    Add Port +
                </button>
            </div>

            <div class="flex justify-end gap-2 pt-2">
                <button type="button" @click="showModal = false"
                        class="px-4 py-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                    Cancel
                </button>
                <button type="submit" class="px-4 py-2 bg-primary text-white rounded-lg hover:opacity-90">
                    Save
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function app() {
        return {
            page: 'home',
            showModal: false,
            editingServer: null,
            sidebarOpen: false,
            servers: [],
            gameServerTemplates: [],
            toast: {
                show: false,
                message: '',
                type: 'error'
            },
            settings: {
                darkMode: false,
                refreshInterval: 30
            },
            refreshTimerId: -1,
            modalConfig: {
                podConfigVisible: false,
                storageVisible: false,
                networkVisible: false,
            },
            form: {},
            init() {
                this.resetForm();
                this.loadSettings();
                this.fetchGameServerTemplates();
                this.fetchServers();
                this.setupRefreshTimer();
            },

            loadSettings() {
                this.settings.darkMode = localStorage.getItem('darkMode') === 'true';
                this.settings.refreshInterval = Number.parseInt(localStorage.getItem("refreshInterval") || "30")
                if (this.settings.darkMode) document.documentElement.classList.add('dark');
            },

            showToast(message, type = 'error') {
                this.toast = {show: true, message, type};
                setTimeout(() => {
                    this.toast.show = false;
                }, 5000);
            },
            updateRefreshInterval() {
                localStorage.setItem("refreshInterval", this.settings.refreshInterval);
                this.setupRefreshTimer();
            },
            setupRefreshTimer() {
                if (this.refreshTimerId !== -1) {
                    clearInterval(this.refreshTimerId)
                }
                this.refreshTimerId = setInterval(async () => {
                    await this.fetchServers();
                }, this.settings.refreshInterval * 1_000)
            },
            async fetchGameServerTemplates() {
                this.gameServerTemplates = (await fetch("/api/v1/game-server-templates")).json() || [];
            },
            async fetchServers() {
                try {
                    const response = await fetch('/api/v1/game-servers');
                    const data = await response.json();
                    this.servers = data.map(s => ({
                        id: s.game_server_id,
                        name: s.game_server.name,
                        game: s.game_server.game_type,
                        game_version: s.game_server.game_version,
                        image: s.game_server.pod_config?.image || '',
                        storage_size: s.game_server.pvc_config?.size_mib || 0,
                        network_identity: s.network_identity,
                        ip: s.network_identity?.ip_address || '',
                        ports: s.network_identity?.ports || [],
                        players: 0,
                        max_players: s.game_server.max_players,
                        status: s.instance ? s.instance.pod_status : 'Offline',
                        instance_id: s.instance?.id || null
                    }));
                } catch (error) {
                    console.error('Failed to fetch servers:', error);
                    this.servers = [];
                }
            },
            formDefaultValue() {
                return {
                    name: '',
                    game_version: '',
                    max_players: 0,
                    template: {
                        template_name: '',
                        description: '',
                        game_type: '',
                        icon_url: '',
                        init_template: '',
                        pod_config: {
                            image: '',
                            env: {}
                        },
                        service_config: {
                            ports: [
                                {port: '', protocol: ''}
                            ]
                        },
                        pvc_config: {
                            size_mib: '',
                            size_unit: ''
                        }
                    },
                }
            },
            useTemplate(template) {
                // TODO This does not perform a deep copy of template. Need to do a deep copy
                this.form = {...this.form, template: {...template}}
            },
            resetForm() {
                this.form = this.formDefaultValue();
            },
            serverAddressLine(server) {
                const ports = server.ports.map(p => `${p.port}/${p.protocol}`).join(",")
                return server.ip + ":" + ports
            },
            async createServer() {
                const template = this.form.template
                const newServerRequest = {
                    ...this.form,
                    max_players: Number.parseInt(this.form.max_players),
                    template: {
                        ...template,
                        service_config: {
                            ...template.service_config,
                            ports: template.service_config.ports.map(p => ({
                                ...p,
                                port: Number.parseInt(p.port)
                            }))
                        },
                        pvc_config: {
                            ...template.pvc_config,
                            size: (typeof template.pvc_config.size === 'number') ? template.pvc_config.size : Number.parseInt(template.pvc_config.size)
                        }
                    }
                }
                try {
                    const resp = await fetch("/api/v1/game-servers", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(newServerRequest)
                    });
                    if (!resp.ok) {
                        let err = await resp.text()
                        this.showToast(err || 'Failed to create server', 'error');
                    } else {
                        await this.fetchServers();
                        this.showModal = false;
                    }
                } catch (e) {
                    console.error(e);
                }
            },

            editServer(server) {
                let storageSize = server.storage_size || 1024;
                let storageUnit = 'mib';
                if (storageSize >= 1024) {
                    storageSize = Math.round(storageSize / 1024);
                    storageUnit = 'gib';
                }
                this.editingServer = server;
                this.form = {
                    name: server.name,
                    id: server.id,
                    image: server.image,
                    storage_size: storageSize,
                    storage_unit: storageUnit,
                    ip: server.ip,
                    ports: server.ports,
                    max_players: server.max_players
                };
                this.showModal = true;
            },

            async deleteServer(id) {
                const result = await fetch(`/api/v1/game-servers?game_server_id=${encodeURIComponent(id)}`, {
                    method: "DELETE"
                });
                if (!result.ok) {
                    this.showToast((await result.text()) || "Failed to delete server")
                } else {
                    await this.fetchServers();
                }
            },

            async toggleStatus(server) {
                switch (server.status) {
                    case 'Offline':
                        await this.startServerInstance(server);
                        break;
                    case 'Running':
                        await this.stopServerInstance(server);
                        break;
                    default:
                        this.showToast("Server is the process of starting/stopping...", "info")
                }

            },
            async startServerInstance(server) {
                const resp = await fetch("/api/v1/game-servers/start", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({game_server_id: server.id})
                });
                if (!resp.ok) {
                    this.showToast((await resp.text()) || "Failed to start server")
                } else {
                    await this.fetchServers();
                }
            },
            async stopServerInstance(server) {
                const resp = await fetch("/api/v1/game-servers/stop", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({game_server_id: server.id})
                });
                if (!resp.ok) {
                    this.showToast((await resp.text()) || "Failed to stop server")
                } else {
                    await this.fetchServers();
                }
            },
            toggleDarkMode() {
                localStorage.setItem('darkMode', this.settings.darkMode);
                document.documentElement.classList.toggle('dark', this.settings.darkMode);
            }
        }
    }
</script>

<style>[x-cloak] {
    display: none !important;
}</style>
</body>
</html>
