<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nautikal Panel</title>
    <style>
        [x-cloak] {
            display: none !important;
        }
    </style>
    <link rel="stylesheet" href="./src/style.css">
    <script type="module" src="src/main.ts"></script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 min-h-screen" x-data="app()" x-cloak>

<!-- Mobile Header -->
<header class="mobile-header">
    <div class="flex items-center justify-between">
        <h1 class="heading-primary dark:text-gray-100">🎮 Nautikal Panel</h1>
        <button @click="sidebarOpen = !sidebarOpen" class="icon-btn">
            <svg x-show="!sidebarOpen" class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
            <svg x-show="sidebarOpen" class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
    <nav x-show="sidebarOpen" class="mt-4 space-y-2">
        <a @click="window.location.hash = '#home'; sidebarOpen = false"
           :class="page === 'home' ? 'nav-link-active' : 'nav-link-inactive'">
            🏠 Home
        </a>
        <a @click="window.location.hash='#settings'; sidebarOpen = false"
           :class="page === 'settings' ? 'nav-link-active' : 'nav-link-inactive'">
            ⚙️ Settings
        </a>
        <p class="version-text pt-2">v1.0.0</p>
    </nav>
</header>

<!-- Sidebar -->
<aside class="sidebar">
    <h1 class="heading-primary mb-8 dark:text-gray-100">🎮 Nautikal Panel</h1>
    <nav class="flex-1 space-y-2">
        <a @click="window.location.hash = '#home'"
           :class="page === 'home' ? 'nav-link-active' : 'nav-link-inactive'">
            🏠 Home
        </a>
        <a @click="window.location.hash = '#settings'"
           :class="page === 'settings' ? 'nav-link-active' : 'nav-link-inactive'">
            ⚙️ Settings
        </a>
    </nav>
    <p class="version-text">v1.0.0</p>
</aside>

<!-- Main Content -->
<main class="main-content">

    <!-- Home Page -->
    <div x-show="page === 'home'" x-cloak>
        <div class="flex justify-between items-center mb-6">
            <h2 class="heading-secondary">Game Servers</h2>
            <button @click="showModal = true;" class="btn-primary">
                + Add Server
            </button>
        </div>

        <!-- Server Grid -->
        <div class="server-grid">
            <template x-for="server in $store.gameServers.servers" :key="server.id">
                <div class="server-card">
                    <div class="flex gap-2 mb-2">
                        <img :src="server.icon_url" width="64px" height="64px"/>
                        <div class="flex justify-between items-start mb-2 flex-1">
                            <div>
                                <h3 class="font-semibold text-gray-800 dark:text-white" x-text="server.name"></h3>
                                <p class="text-sm text-muted" x-text="server.game"></p>
                            </div>
                            <i x-show="server.instance_type === 'sftp-only'" class="text-sm text-muted">(SFTP Only)</i>
                            <span :class="server.status === 'Running' ? 'bg-success' : (server.status === 'Offline' ? 'bg-gray-400' : 'bg-warn')"
                                  class="status-dot"></span>
                        </div>
                    </div>
                    <div>
                        <p class="server-address" x-text="$store.gameServers.serverAddressLine(server)"></p>
                        <p class="server-info">
                            👥 <span x-text="server.players"></span> players
                        </p>
                        <div class="flex gap-2 flex-wrap">
                            <button type="button" @click="$store.gameServers.toggleStatus(server)"
                                    class="btn-action"
                                    :disabled="!['Offline','Running'].includes(server.status)"
                                    :class="server.status === 'Offline' ? 'bg-success' : (server.status === 'Running' ? 'bg-danger' : 'bg-warn')">
                                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                     class="size-5 animate-spin motion-reduce:animate-none"
                                     x-show="!['Offline', 'Running'].includes(server.status)">
                                    <path opacity="0.25"
                                          d="M12,1A11,11,0,1,0,23,12,11,11,0,0,0,12,1Zm0,19a8,8,0,1,1,8-8A8,8,0,0,1,12,20Z"/>
                                    <path
                                          d="M10.14,1.16a11,11,0,0,0-9,8.92A1.59,1.59,0,0,0,2.46,12,1.52,1.52,0,0,0,4.11,10.7a8,8,0,0,1,6.66-6.61A1.42,1.42,0,0,0,12,2.69h0A1.57,1.57,0,0,0,10.14,1.16Z"/>
                                </svg>
                                <span x-text="server.status === 'Offline' ? 'Start' : (server.status === 'Running' ? 'Stop' : 'Wait')"></span>
                            </button>
                            <button @click="$dispatch('open-drawer', {server: server})"
                                    class="btn-secondary disabled:opacity-50 disabled:cursor-not-allowed"
                                    title="View details">
                                <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                                Details
                            </button>
                            <button @click="deleteServer(server.id)" class="btn-danger">
                                Delete
                            </button>
                            <button @click="$dispatch('edit', {server: server})"
                                    :disabled="server.status !== 'Offline'"
                                    class="btn-secondary disabled:opacity-50 disabled:cursor-not-allowed">
                                Edit
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Empty State -->
        <div x-show="$store.gameServers.servers.length === 0" class="text-center py-12 text-muted">
            <p class="text-4xl mb-2">🖥️</p>
            <p>No servers yet. Click "Add Server" to get started!</p>
        </div>
    </div>

    <!-- Settings Page -->
    <div x-show="page === 'settings'" x-html="content" x-data="settings()">
    </div>
</main>

<!-- Logs Modal -->
<div x-data="logsModal()" x-html="content" @open-logs-modal.window="open($event.detail.server)"></div>

<!-- SFTP Credentials Modal -->
<div x-data="sftpCredentialsModal()" x-html="content" @open-sftp-modal.window="fetchCredentials($event.detail.server)" id="sftp-modal"></div>

<!-- Notifications -->
<div x-data="notificationComponent()" @notify.window="addNotification({
            variant: $event.detail.variant,
            sender: $event.detail.sender,
            title: $event.detail.title,
            message: $event.detail.message,
        })" x-html="content">
</div>

<!-- Add/Edit Modal -->
<div x-data="createServerModal()" x-html="content"></div>

<!-- Edit Server Modal - uses main app's state -->
<div x-data="editServerModal()" x-html="content" @edit.window="openEditModal($event.detail.server)"></div>

<!-- Server Details Drawer -->
<div x-data="serverDrawer()"
     x-html="content"
     @open-drawer.window="openDrawer($event.detail.server)"
     @game-server-status-changed.window="gameServerStatusChanged($event.detail)">
</div>
</body>

</html>
