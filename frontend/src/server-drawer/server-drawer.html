<div x-show="open" 
     x-cloak 
     class="drawer-backdrop" 
     @click.self="closeDrawer()"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0">
    <div class="drawer" 
         @click.stop
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="translate-x-full">
        <div class="drawer-header">
            <div class="flex items-center gap-3">
                <img :src="server?.icon_url" 
                     width="48px" height="48px" 
                     class="rounded-lg"/>
                <div>
                    <h3 class="heading-tertiary" x-text="server?.name || ''"></h3>
                    <p class="text-sm text-muted" x-text="server?.game || ''"></p>
                </div>
            </div>
            <button @click="closeDrawer()" class="close-btn">
                <svg class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        
        <div class="drawer-body">
            <div class="drawer-section" x-show="server?.description">
                <p class="text-sm text-gray-600 dark:text-gray-400" x-text="server?.description"></p>
            </div>

            <div class="drawer-section">
                <h4 class="drawer-section-title">Connection</h4>
                <div class="resource-info">
                    <div class="flex justify-between items-center py-1">
                        <span class="resource-label">Address</span>
                        <code class="text-sm resource-value" x-text="$store.gameServers.serverAddressLine(server)"></code>
                    </div>
                </div>
            </div>

            <div class="drawer-section">
                <h4 class="drawer-section-title">Quick Actions</h4>
                <div class="flex gap-2 flex-wrap">
                    <button type="button" @click="$store.gameServers.toggleStatus(server)"
                            class="btn-action"
                            :disabled="!['Offline','Running'].includes(server?.status)"
                            :class="server?.status === 'Offline' ? 'bg-success' : (server?.status === 'Running' ? 'bg-danger' : 'bg-warn')">
                        <span x-text="server?.status === 'Offline' ? 'Start' : (server?.status === 'Running' ? 'Stop' : 'Wait')"></span>
                    </button>
                    <button type="button" @click="$store.gameServers.startSftpOnly(server)"
                            x-show="server?.status === 'Offline'"
                            class="btn-secondary disabled:opacity-50 disabled:cursor-not-allowed">
                        SFTP Only
                    </button>
                    <button @click="fetchSftpCredentials()"
                            x-show="server?.status === 'Running'"
                            class="btn-secondary disabled:opacity-50 disabled:cursor-not-allowed">
                        SFTP Credentials
                    </button>
                </div>
            </div>

            <div class="drawer-section">
                <h4 class="drawer-section-title">Resource Usage</h4>
                <div class="resource-info space-y-3">
                    <div class="resource-item">
                        <div class="flex justify-between mb-1">
                            <span class="resource-label">CPU</span>
                            <span class="resource-value">
                                <span x-text="$store.gameServers.formatCpuUsage(server)"></span>
                            </span>
                        </div>
                        <div class="h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                            <div class="h-full rounded-full transition-all duration-500"
                                 :class="$store.gameServers.getCpuUsageColor($store.gameServers.calculateCpuUsagePercentage(server))"
                                 :style="{ width: $store.gameServers.calculateCpuUsagePercentage(server) + '%' }">
                            </div>
                        </div>
                    </div>
                    <div class="resource-item">
                        <div class="flex justify-between mb-1">
                            <span class="resource-label">Memory</span>
                            <span class="resource-value">
                                <span x-text="$store.gameServers.formatMemoryUsage(server)"></span>
                            </span>
                        </div>
                        <div class="h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                            <div class="h-full rounded-full transition-all duration-500"
                                 :class="$store.gameServers.getMemoryUsageColor($store.gameServers.calculateMemoryUsagePercentage(server))"
                                 :style="{ width: $store.gameServers.calculateMemoryUsagePercentage(server) + '%' }">
                            </div>
                        </div>
                    </div>
                    <div class="resource-item">
                        <div class="flex justify-between mb-1">
                            <span class="resource-label">Storage</span>
                            <span class="resource-value" 
                                  x-text="$store.gameServers.formatStorage(server?.storage_size || 0, server?.storage_unit || 'Gi')"></span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="drawer-section flex-1 min-h-0 flex flex-col" 
                 x-show="server?.status === 'Running' && server?.instance_type === 'gameserver'">
                <div class="flex items-center justify-between mb-2">
                    <h4 class="drawer-section-title">Logs</h4>
                    <div class="flex items-center gap-2">
                        <span x-show="$store.logViewer.connected" class="text-xs text-success">Connected</span>
                        <span x-show="!$store.logViewer.connected && open" class="text-xs text-warn">Disconnected</span>
                        <button @click="$store.logViewer.clear()" class="btn-secondary text-xs">Clear</button>
                        <button @click="popOutLogs()" class="btn-secondary text-xs" title="Open logs in modal">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="log-viewer flex-1" x-ref="logContainer" id="drawer-log-container">
                    <pre class="log-content"><template x-for="(line, index) in $store.logViewer.lines" :key="index"><div x-text="line"></div></template></pre>
                    <div x-show="$store.logViewer.lines.length === 0" class="text-gray-500 text-sm">
                        No logs yet. Server must be running to show logs.
                    </div>
                </div>
                <div class="text-xs text-gray-500 mt-1">
                    <span x-text="$store.logViewer.lines.length + ' lines'"></span>
                </div>
            </div>
        </div>
    </div>
</div>
