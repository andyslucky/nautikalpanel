<div class="group notification-container"
     x-on:mouseenter="$dispatch('pause-auto-dismiss')"
     x-on:mouseleave="$dispatch('resume-auto-dismiss')">
    <template x-for="(notification, index) in notifications" :key="notification.id">
        <div>
            <!-- Info Notification -->
            <template x-if="notification.variant === 'info'">
                <div x-data="{ isVisible: false, timeout: null }" x-cloak x-show="isVisible"
                     class="notification border-info"
                     role="alert"
                     x-on:pause-auto-dismiss.window="clearTimeout(timeout)"
                     x-on:resume-auto-dismiss.window="timeout = setTimeout(() => {(isVisible = false), removeNotification(notification.id) }, displayDuration)"
                     x-init="$nextTick(() => { isVisible = true }), (timeout = setTimeout(() => { isVisible = false, removeNotification(notification.id)}, displayDuration))"
                     x-transition:enter="transition duration-300 ease-out" x-transition:enter-end="translate-y-0"
                     x-transition:enter-start="translate-y-8"
                     x-transition:leave="transition duration-300 ease-in"
                     x-transition:leave-end="-translate-x-24 opacity-0 md:translate-x-24"
                     x-transition:leave-start="translate-x-0 opacity-100">
                    <div class="notification-body bg-info/10">
                        <div class="notification-icon bg-info/15 text-info" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5" aria-hidden="true">
                                <path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-7-4a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM9 9a.75.75 0 0 0 0 1.5h.253a.25.25 0 0 1 .244.304l-.459 2.066A1.75 1.75 0 0 0 10.747 15H11a.75.75 0 0 0 0-1.5h-.253a.25.25 0 0 1-.244-.304l.459-2.066A1.75 1.75 0 0 0 9.253 9H9Z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                        <div class="flex flex-col gap-2">
                            <h3 x-cloak x-show="notification.title" class="notification-title text-info" x-text="notification.title"></h3>
                            <p x-cloak x-show="notification.message" class="notification-message" x-text="notification.message"></p>
                        </div>
                        <button type="button" class="notification-dismiss" aria-label="dismiss notification"
                                x-on:click="(isVisible = false), removeNotification(notification.id)">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke="currentColor"
                                 fill="none" stroke-width="2" class="size-5 shrink-0" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </template>

            <!-- Success Notification -->
            <template x-if="notification.variant === 'success'">
                <div x-data="{ isVisible: false, timeout: null }" x-cloak x-show="isVisible"
                     class="notification border-success"
                     role="alert"
                     x-on:pause-auto-dismiss.window="clearTimeout(timeout)"
                     x-on:resume-auto-dismiss.window="timeout = setTimeout(() => {(isVisible = false), removeNotification(notification.id) }, displayDuration)"
                     x-init="$nextTick(() => { isVisible = true }), (timeout = setTimeout(() => { isVisible = false, removeNotification(notification.id)}, displayDuration))"
                     x-transition:enter="transition duration-300 ease-out" x-transition:enter-end="translate-y-0"
                     x-transition:enter-start="translate-y-8"
                     x-transition:leave="transition duration-300 ease-in"
                     x-transition:leave-end="-translate-x-24 opacity-0 md:translate-x-24"
                     x-transition:leave-start="translate-x-0 opacity-100">
                    <div class="notification-body bg-success/10">
                        <div class="notification-icon bg-success/15 text-success" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5" aria-hidden="true">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                        <div class="flex flex-col gap-2">
                            <h3 x-cloak x-show="notification.title" class="notification-title text-success" x-text="notification.title"></h3>
                            <p x-cloak x-show="notification.message" class="notification-message" x-text="notification.message"></p>
                        </div>
                        <button type="button" class="notification-dismiss" aria-label="dismiss notification"
                                x-on:click="(isVisible = false), removeNotification(notification.id)">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke="currentColor"
                                 fill="none" stroke-width="2" class="size-5 shrink-0" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </template>

            <!-- Warning Notification -->
            <template x-if="notification.variant === 'warning'">
                <div x-data="{ isVisible: false, timeout: null }" x-cloak x-show="isVisible"
                     class="notification border-warn"
                     role="alert"
                     x-on:pause-auto-dismiss.window="clearTimeout(timeout)"
                     x-on:resume-auto-dismiss.window="timeout = setTimeout(() => {(isVisible = false), removeNotification(notification.id) }, displayDuration)"
                     x-init="$nextTick(() => { isVisible = true }), (timeout = setTimeout(() => { isVisible = false, removeNotification(notification.id)}, displayDuration))"
                     x-transition:enter="transition duration-300 ease-out" x-transition:enter-end="translate-y-0"
                     x-transition:enter-start="translate-y-8"
                     x-transition:leave="transition duration-300 ease-in"
                     x-transition:leave-end="-translate-x-24 opacity-0 md:translate-x-24"
                     x-transition:leave-start="translate-x-0 opacity-100">
                    <div class="notification-body bg-warn/10">
                        <div class="notification-icon bg-warn/15 text-warn" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5" aria-hidden="true">
                                <path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-8-5a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 1-1.5 0v-4.5A.75.75 0 0 1 10 5Zm0 10a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                        <div class="flex flex-col gap-2">
                            <h3 x-cloak x-show="notification.title" class="notification-title text-warn" x-text="notification.title"></h3>
                            <p x-cloak x-show="notification.message" class="notification-message" x-text="notification.message"></p>
                        </div>
                        <button type="button" class="notification-dismiss" aria-label="dismiss notification"
                                x-on:click="(isVisible = false), removeNotification(notification.id)">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke="currentColor"
                                 fill="none" stroke-width="2" class="size-5 shrink-0" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </template>

            <!-- Danger Notification -->
            <template x-if="notification.variant === 'danger'">
                <div x-data="{ isVisible: false, timeout: null }" x-cloak x-show="isVisible"
                     class="notification border-danger"
                     role="alert"
                     x-on:pause-auto-dismiss.window="clearTimeout(timeout)"
                     x-on:resume-auto-dismiss.window="timeout = setTimeout(() => {(isVisible = false), removeNotification(notification.id) }, displayDuration)"
                     x-init="$nextTick(() => { isVisible = true }), (timeout = setTimeout(() => { isVisible = false, removeNotification(notification.id)}, displayDuration))"
                     x-transition:enter="transition duration-300 ease-out" x-transition:enter-end="translate-y-0"
                     x-transition:enter-start="translate-y-8"
                     x-transition:leave="transition duration-300 ease-in"
                     x-transition:leave-end="-translate-x-24 opacity-0 md:translate-x-24"
                     x-transition:leave-start="translate-x-0 opacity-100">
                    <div class="notification-body bg-danger/10">
                        <div class="notification-icon bg-danger/15 text-danger" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5" aria-hidden="true">
                                <path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-8-5a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 1-1.5 0v-4.5A.75.75 0 0 1 10 5Zm0 10a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                        <div class="flex flex-col gap-2">
                            <h3 x-cloak x-show="notification.title" class="notification-title text-danger" x-text="notification.title"></h3>
                            <p x-cloak x-show="notification.message" class="notification-message" x-text="notification.message"></p>
                        </div>
                        <button type="button" class="notification-dismiss" aria-label="dismiss notification"
                                x-on:click="(isVisible = false), removeNotification(notification.id)">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke="currentColor"
                                 fill="none" stroke-width="2" class="size-5 shrink-0" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </template>

            <!-- Message Notification -->
            <template x-if="notification.variant === 'message'">
                <div x-data="{ isVisible: false, timeout: null }" x-cloak x-show="isVisible"
                     class="notification dark:border-gray-600"
                     role="alert"
                     x-on:pause-auto-dismiss.window="clearTimeout(timeout)"
                     x-on:resume-auto-dismiss.window="timeout = setTimeout(() => { isVisible = false, removeNotification(notification.id) }, displayDuration)"
                     x-init="$nextTick(() => { isVisible = true }), (timeout = setTimeout(() => { isVisible = false, removeNotification(notification.id)}, displayDuration))"
                     x-transition:enter="transition duration-300 ease-out" x-transition:enter-end="translate-y-0"
                     x-transition:enter-start="translate-y-8"
                     x-transition:leave="transition duration-300 ease-in"
                     x-transition:leave-end="-translate-x-24 opacity-0 md:translate-x-24"
                     x-transition:leave-start="translate-x-0 opacity-100">
                    <div class="notification-body">
                        <div class="flex w-full items-center gap-2.5">
                            <img x-cloak x-show="notification.sender.avatar" class="mr-2 size-12 rounded-full"
                                 alt="avatar" aria-hidden="true" x-bind:src="notification.sender.avatar"/>
                            <div class="flex flex-col items-start gap-2">
                                <h3 x-cloak x-show="notification.sender.name" class="notification-title" x-text="notification.sender.name"></h3>
                                <p x-cloak x-show="notification.message" class="notification-message" x-text="notification.message"></p>
                                <div class="flex items-center gap-4">
                                    <button type="button" class="text-sm font-bold text-primary hover:opacity-75">Reply</button>
                                    <button type="button" class="text-sm font-bold hover:opacity-75 dark:text-gray-300"
                                            x-on:click="(isVisible = false), setTimeout(() => { removeNotification(notification.id) }, 400)">Dismiss</button>
                                </div>
                            </div>
                        </div>
                        <button type="button" class="notification-dismiss" aria-label="dismiss notification"
                                x-on:click="(isVisible = false), removeNotification(notification.id)">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke="currentColor"
                                 fill="none" stroke-width="2" class="size-5 shrink-0" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </template>
</div>
