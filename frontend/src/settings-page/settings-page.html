<h2 class="heading-secondary mb-6">Settings</h2>
<div class="settings-panel">
    <label class="form-row">
        <span class="text-label">Dark Mode</span>
        <input type="checkbox" x-model="settings.darkMode" @change="toggleDarkMode()" class="w-5 h-5 cursor-pointer">
    </label>
    <p class="text-muted text-sm">Server status updates are streamed in real-time via WebSocket.</p>
</div>

<!-- Template Repositories Section -->
<div class="settings-panel mt-6">
    <h3 class="heading-tertiary mb-4">Template Repositories</h3>
    <p class="text-muted text-sm mb-4">Manage where game server templates are loaded from. Repositories can be local directories or remote URLs.</p>

    <!-- Add Repository Form -->
    <div class="bg-gray-50 dark:bg-gray-800 p-4 rounded mb-4">
        <div class="space-y-3">
            <div>
                <label class="form-label-sm">Name</label>
                <input type="text" id="repo-name" placeholder="e.g., My Templates" class="input-field w-full dark:text-gray-300">
            </div>
            <div>
                <label class="form-label-sm">URL / Path</label>
                <input type="text"
                       id="repo-url"
                       placeholder="e.g., /path/to/templates or https://example.com/templates"
                       class="input-field w-full dark:text-gray-300">
            </div>
            <button @click="addRepository()"
                    class="btn-primary w-full"
                    :disabled="$store.templateRepositories.loading">
                <span x-show="!$store.templateRepositories.loading">Add Repository</span>
                <span x-show="$store.templateRepositories.loading">Adding...</span>
            </button>
        </div>
    </div>

    <!-- Repository List -->
    <div x-show="$store.templateRepositories.repositories.length === 0"
         x-cloak
         class="text-center py-8 text-muted">
        <p class="text-3xl mb-2">📂</p>
        <p>No template repositories configured.</p>
    </div>

    <div x-show="$store.templateRepositories.repositories.length > 0" x-cloak>
        <template x-for="repo in $store.templateRepositories.repositories" :key="repo.id">
            <div class="flex items-center justify-between p-3 bg-white dark:bg-gray-800 rounded border border-gray-200 dark:border-gray-700 mb-2">
                <div class="flex-1 min-w-0">
                    <h4 class="font-semibold text-gray-800 dark:text-white truncate" x-text="repo.name"></h4>
                    <p class="text-sm text-muted truncate" x-text="repo.url"></p>
                </div>
                <button @click="deleteRepository(repo.id)"
                        :disabled="$store.templateRepositories.loading"
                        class="btn-danger ml-2">
                    Delete
                </button>
            </div>
        </template>
    </div>
</div>
