<div x-show="show" x-cloak class="modal-backdrop" @click.self="close()">
    <div class="modal-content max-w-md">
        <div class="modal-header">
            <h3 class="heading-tertiary">SFTP Credentials</h3>
            <button @click="close()" class="close-btn">
                <svg class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="p-4 space-y-4">
            <div class="warning-box">
                <p class="warning-title">Keep these credentials secure!</p>
                <p class="warning-text">These credentials are ephemeral and will be lost when the Game Server is stopped.</p>
            </div>
            <div class="space-y-2">
                <label class="form-label-sm">Host</label>
                <div class="flex items-center gap-2">
                    <code class="flex-1 px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-sm text-label"
                          x-text="server?.ip || 'Pending...'"></code>
                    <button @click="copyToClipboard(server?.ip || '', 'host')" class="btn-secondary text-xs">Copy</button>
                </div>
            </div>
            <div class="space-y-2">
                <label class="form-label-sm">Port</label>
                <div class="flex items-center gap-2">
                    <code class="flex-1 px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-sm text-label">22</code>
                </div>
            </div>
            <div class="space-y-2">
                <label class="form-label-sm">Username</label>
                <div class="flex items-center gap-2">
                    <code class="flex-1 px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-sm text-label"
                          x-text="credentials?.username || ''"></code>
                    <button @click="copyToClipboard(credentials?.username || '', 'username')" class="btn-secondary text-xs">Copy</button>
                </div>
            </div>
            <div class="space-y-2">
                <label class="form-label-sm">Password</label>
                <div class="flex items-center gap-2">
                    <code class="flex-1 px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-sm font-mono text-label"
                          x-text="credentials?.password || ''"></code>
                    <button @click="copyToClipboard(credentials?.password || '', 'password')" class="btn-secondary text-xs">Copy</button>
                </div>
            </div>
        </div>
    </div>
</div>
