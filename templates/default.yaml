apiVersion: v1
kind: Pod
metadata:
  generateName: "gs-{{gameType | lower}}-"
  labels:
    app.kubernetes.io/managed-by: "nautikal"
    nautikal.io/game-server-id: "{{gameServerId}}"
spec:
  containers:
    - name: gameserver
      image: "{{image}}"
      {%- if command %}
      command:
      {%- for c in command %}
        - "{{c}}"
      {%- endfor %}
      {%- endif %}