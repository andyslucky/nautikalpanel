template_name: Minecraft
game_type: Minecraft
description: Minecraft is a sandbox / survival / adventure game with a block art style.
icon_url: "https://www.freeiconspng.com/uploads/minecraft-icon-13.png"
pod_config:
  image: "itzg/minecraft-server:latest"
  env:
    MOTD: "Welcome to {{server.name}}"
    TYPE: "VANILLA"
    DIFFICULTY: "normal"
    EULA: "true"
    VERSION: "{% if server.game_version %}{{server.game_version}}{% else %}LATEST{% endif %}"
    INIT_MEMORY: "2G"
    MAX_MEMORY: "4G"
    MAX_PLAYERS: "{{server.max_players}}"
pvc_config:
  size: 500
  size_unit: "Mi"
service_config:
  ports:
    - port: 25565
      protocol: Both
